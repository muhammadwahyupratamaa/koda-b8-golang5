name: Build Docker Image
run-name: Running build image
on:
    push:
        tags:
            - v1.*
jobs:
    build-app:
        name: "Build Go Application"
        runs-on: ubuntu-latest
        outputs:
            output1: ${{ steps.upload-bin.outputs.artifact-id }}

        steps:
            - name: setup Go 
              uses: actions/setup-go@v5
              with:
                go-version : "1.26.4"

            - name: Get source
              uses: actions/checkout@v4
            - name: Download dependencies
              run: go mod tidy
            - name: build-app
              run: go build -o auth-app main.go
            - name: Save artifact
              uses: actions/upload-artifact@v4
              with:
                name: build-result
                path: auth-app
    
    release-app:
        name: "Release builded app"
        needs: build-app
        runs-on: ubuntu-latest
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v5
              with:
                artifact-ids: ${{needs.build-app.outputs.output1}}
            - name: Compress artifact
              run: zip -r auth-app.zip ./*
            - name: Release
              uses: softprops/action-gh-release@v3
              with:
                files:
                    auth-app.zip

    build-image:
        runs-on: ubuntu-latest
        needs: release-app
        steps:
            - name: Check out repository code
              uses: actions/checkout@v4
            - name: login to docker
              run: echo -n ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io --username ${{github.actor}} --password-stdin
            - name: Build image
              run: docker build -t ghcr.io/${{github.repository}}:pra .
            - name: push to ghcr.io
              run: docker push ghcr.io/${{github.repository}}:pra